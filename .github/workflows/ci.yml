name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (stub backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: install GUI dev libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxkbcommon-dev libssl-dev pkg-config \
            libwayland-dev libx11-dev libxcb1-dev libxrandr-dev libxinerama-dev libxi-dev \
            libxcursor-dev libxdamage-dev libxext-dev libxfixes-dev
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test-stub:
    name: cargo test (stub backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install GUI dev libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxkbcommon-dev libssl-dev pkg-config \
            libwayland-dev libx11-dev libxcb1-dev libxrandr-dev libxinerama-dev libxi-dev \
            libxcursor-dev libxdamage-dev libxext-dev libxfixes-dev
      - run: cargo build --workspace --release
      - run: cargo test --workspace --release

  build-unicorn:
    name: build with unicorn-engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential pkg-config libclang-dev
      - name: build pocket-cli with unicorn feature
        run: cargo build --release -p pocket-cli --features unicorn

  build-linux:
    name: build linux release artifacts
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install GUI dev libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxkbcommon-dev libssl-dev pkg-config \
            libwayland-dev libx11-dev libxcb1-dev libxrandr-dev libxinerama-dev libxi-dev \
            libxcursor-dev libxdamage-dev libxext-dev libxfixes-dev
      - name: build CLI + desktop
        run: |
          cargo build --release -p pocket-cli
          cargo build --release -p pocket-desktop
      - name: stage artifacts
        run: |
          mkdir -p dist/PocketHLE-linux
          cp target/release/pockethle dist/PocketHLE-linux/
          cp target/release/pockethle-gui dist/PocketHLE-linux/
          cp README.md dist/PocketHLE-linux/
          cp -f README.ru.md dist/PocketHLE-linux/ 2>/dev/null || true
          tar -C dist -czf PocketHLE-linux-x86_64.tar.gz PocketHLE-linux
      - uses: actions/upload-artifact@v4
        with:
          name: PocketHLE-linux-x86_64
          path: PocketHLE-linux-x86_64.tar.gz

  build-windows:
    name: build windows release artifacts
    runs-on: windows-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: build CLI + desktop
        shell: bash
        run: |
          cargo build --release -p pocket-cli
          cargo build --release -p pocket-desktop
      - name: stage artifacts
        shell: bash
        run: |
          mkdir -p dist/PocketHLE-windows
          cp target/release/pockethle.exe dist/PocketHLE-windows/
          cp target/release/pockethle-gui.exe dist/PocketHLE-windows/
          cp README.md dist/PocketHLE-windows/
          cp -f README.ru.md dist/PocketHLE-windows/ 2>/dev/null || true
      - name: zip artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path dist/PocketHLE-windows/* -DestinationPath PocketHLE-windows-x86_64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: PocketHLE-windows-x86_64
          path: PocketHLE-windows-x86_64.zip

  build-android:
    name: build android APK
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true
      - name: install cargo-ndk
        run: cargo install cargo-ndk --locked
      - name: cross-compile native lib
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cargo ndk \
            -t arm64-v8a \
            -t armeabi-v7a \
            -o frontends/pocket-android/app/src/main/jniLibs \
            build --release -p pocket-android-jni
      - uses: gradle/actions/setup-gradle@v3
      - name: build APK
        working-directory: frontends/pocket-android
        run: |
          gradle wrapper --gradle-version 8.7
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: PocketHLE-android
          path: frontends/pocket-android/app/build/outputs/apk/debug/*.apk
